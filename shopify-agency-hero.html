<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shopify Agency — Hero</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --orange:#E8611A;
  --black:#111;
  --white:#fff;
}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--white);
  color:var(--black);
  overflow-x:hidden;
}

/* ─── Hero ─── */
.hero{
  position:relative;
  width:100%;
  min-height:100vh;
  display:flex;
  align-items:center;
  overflow:hidden;
}

/* Faint vertical grid lines */
.hero::before{
  content:'';
  position:absolute;
  inset:0;
  z-index:0;
  background:repeating-linear-gradient(
    90deg,
    transparent,
    transparent calc(100% / 12 - 1px),
    rgba(232,97,26,.07) calc(100% / 12 - 1px),
    rgba(232,97,26,.07) calc(100% / 12)
  );
  pointer-events:none;
}

/* ─── Background oversized word ─── */
.bg-word{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:1;
  font-family:'Syne',sans-serif;
  font-weight:800;
  font-size:clamp(180px,22vw,340px);
  line-height:.85;
  letter-spacing:-.04em;
  color:var(--orange);
  white-space:nowrap;
  user-select:none;
  pointer-events:none;
  opacity:.92;
}

/* ─── Sunburst SVG ─── */
.sunburst{
  position:absolute;
  top:50%;
  left:55%;
  width:clamp(500px,60vw,900px);
  height:clamp(500px,60vw,900px);
  transform:translate(-50%,-50%);
  z-index:2;
  opacity:.12;
  pointer-events:none;
  animation:spin 120s linear infinite;
}
@keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg)}}

/* ─── Dot accents ─── */
.dot{
  position:absolute;
  width:8px;height:8px;
  border-radius:50%;
  background:var(--orange);
  z-index:3;
  pointer-events:none;
}
.dot--1{top:14%;left:62%;width:6px;height:6px;opacity:.7}
.dot--2{top:55%;left:68%;width:10px;height:10px;opacity:.5}
.dot--3{top:32%;left:45%;width:5px;height:5px;opacity:.6}
.dot--4{top:78%;left:30%;width:7px;height:7px;opacity:.4}
.dot--5{top:18%;left:80%;width:9px;height:9px;opacity:.55}

/* ─── Foreground content ─── */
.hero__inner{
  position:relative;
  z-index:10;
  max-width:1200px;
  width:100%;
  margin:0 auto;
  padding:140px 48px 80px;
}

/* Badge */
.badge{
  display:inline-block;
  font-family:'DM Sans',sans-serif;
  font-weight:500;
  font-size:12px;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--orange);
  border:1.5px solid var(--orange);
  border-radius:100px;
  padding:6px 18px;
  margin-bottom:32px;
  opacity:0;
  animation:fadeUp .8s .2s ease forwards;
}

/* Headline */
.headline{
  font-family:'Syne',sans-serif;
  font-weight:800;
  font-size:clamp(2.8rem,7.5vw,6.5rem);
  line-height:1.0;
  letter-spacing:-.03em;
  color:var(--black);
  max-width:820px;
  margin-bottom:28px;
  opacity:0;
  animation:fadeUp .9s .35s ease forwards;
}

/* Subtitle */
.subtitle{
  font-family:'DM Sans',sans-serif;
  font-weight:300;
  font-size:clamp(1rem,2vw,1.3rem);
  line-height:1.65;
  color:#555;
  max-width:520px;
  margin-bottom:44px;
  opacity:0;
  animation:fadeUp .9s .5s ease forwards;
}

/* Buttons */
.btn-group{
  display:flex;
  flex-wrap:wrap;
  gap:16px;
  opacity:0;
  animation:fadeUp .9s .65s ease forwards;
}
.btn{
  display:inline-flex;
  align-items:center;
  gap:8px;
  font-family:'DM Sans',sans-serif;
  font-weight:500;
  font-size:15px;
  padding:16px 32px;
  border-radius:100px;
  cursor:pointer;
  border:2px solid transparent;
  transition:all .25s ease;
  text-decoration:none;
}
.btn--fill{
  background:var(--orange);
  color:var(--white);
  border-color:var(--orange);
}
.btn--fill:hover{
  background:#c9510e;
  border-color:#c9510e;
  transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(232,97,26,.3);
}
.btn--outline{
  background:transparent;
  color:var(--black);
  border-color:var(--black);
}
.btn--outline:hover{
  background:var(--black);
  color:var(--white);
  transform:translateY(-2px);
}
.btn svg{width:16px;height:16px;fill:currentColor}

/* ─── Fade-up keyframe ─── */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(28px)}
  to{opacity:1;transform:translateY(0)}
}

/* ─── Responsive ─── */
@media(max-width:768px){
  .hero__inner{padding:120px 24px 60px}
  .bg-word{font-size:clamp(110px,30vw,200px)}
  .sunburst{left:50%;width:400px;height:400px}
  .dot--5,.dot--4{display:none}
}
@media(max-width:480px){
  .hero__inner{padding:100px 20px 48px}
  .headline{margin-bottom:20px}
  .subtitle{margin-bottom:32px}
  .btn{padding:14px 24px;font-size:14px}
}
</style>
</head>
<body>

<section class="hero">
  <!-- Faint grid lines via ::before -->

  <!-- Oversized background word -->
  <div class="bg-word" aria-hidden="true">creative</div>

  <!-- Sunburst SVG -->
  <svg class="sunburst" viewBox="0 0 800 800" aria-hidden="true">
    <g transform="translate(400,400)">
      <g id="rays">
        <polygon points="0,-400 12,-400 0,0" fill="#E8611A"/>
        <polygon points="0,-400 -12,-400 0,0" fill="#E8611A"/>
      </g>
      <script>
        /* Duplicate rays around center */
        (function(){
          var g=document.getElementById('rays');
          var parent=g.parentNode;
          for(var i=1;i<36;i++){
            var c=g.cloneNode(true);
            c.removeAttribute('id');
            c.setAttribute('transform','rotate('+i*10+')');
            parent.appendChild(c);
          }
        })();
      </script>
    </g>
  </svg>

  <!-- Dot accents -->
  <span class="dot dot--1"></span>
  <span class="dot dot--2"></span>
  <span class="dot dot--3"></span>
  <span class="dot dot--4"></span>
  <span class="dot dot--5"></span>

  <!-- Foreground content -->
  <div class="hero__inner">
    <span class="badge">Shopify Experts</span>
    <h1 class="headline">Build stores that<br/>sell while you sleep.</h1>
    <p class="subtitle">
      Your go-to partner for Shopify development and design projects.
      We craft high-converting storefronts that look stunning and perform flawlessly.
    </p>
    <div class="btn-group">
      <a href="#" class="btn btn--fill">
        Start Your Project
        <svg viewBox="0 0 24 24"><path d="M5 12h14m-7-7 7 7-7 7" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </a>
      <a href="#" class="btn btn--outline">View Our Work</a>
    </div>
  </div>
</section>

</body>
</html>
